<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>英語記憶配對遊戲</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&amp;family=Fredoka:wght@400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    .card { perspective: 1000px; cursor: pointer; transition: transform 0.1s; }
    .card:hover { transform: scale(1.03); }
    .card.matched { opacity: 0.6; pointer-events: none; }
    .card.selected { ring: 3px; box-shadow: 0 0 0 3px #f59e0b; }
    .card.correct { animation: correctPulse 0.5s ease; }
    .card.wrong { animation: shake 0.4s ease; }
    @keyframes correctPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
    @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }
    @keyframes fadeIn { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
    .fade-in { animation: fadeIn 0.4s ease forwards; }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 <script src="/_sdk/telemetry_sdk.js"></script></head>
 <body class="h-full w-full">
  <div id="app" class="h-full w-full bg-gradient-to-br from-indigo-900 via-purple-900 to-slate-900 flex flex-col items-center justify-center p-4 overflow-auto" style="font-family:'Noto Sans TC','Fredoka',sans-serif">
   <div class="w-full max-w-2xl mx-auto text-center">
    <!-- 輸入座號畫面 -->
    <div id="input-screen" class="fade-in">
     <h1 id="title" class="text-3xl md:text-4xl font-black text-white mb-6" style="font-family:'Fredoka','Noto Sans TC',sans-serif">英語記憶配對遊戲</h1>
     <p class="text-purple-200 text-sm mb-8">康軒版國中英文第二冊第三章</p>
     <div class="bg-white/10 backdrop-blur rounded-2xl p-8 mb-6">
      <label class="block text-white font-bold text-lg mb-4">請輸入班級座號</label> <input id="student-id-input" type="text" placeholder="例如：204 或 2-04" class="w-full px-4 py-3 rounded-xl text-center text-lg font-bold border-2 border-amber-400 focus:outline-none focus:ring-2 focus:ring-amber-300 bg-white/90 text-indigo-900 mb-6"> <button id="start-btn" onclick="enterGame()" class="w-full bg-amber-400 hover:bg-amber-300 text-indigo-900 font-bold px-6 py-3 rounded-xl transition-colors text-lg shadow-lg">開始遊戲</button>
     </div>
    </div><!-- 遊戲畫面 -->
    <div id="game-screen" class="hidden">
     <h1 id="title" class="text-3xl md:text-4xl font-black text-white mb-2" style="font-family:'Fredoka','Noto Sans TC',sans-serif">英語記憶配對遊戲</h1>
     <p class="text-purple-200 text-sm mb-2">康軒版國中英文第二冊第三章</p>
     <p class="text-amber-300 font-bold mb-4">座號：<span id="display-student-id"></span></p>
     <div id="score-bar" class="flex items-center justify-between bg-white/10 backdrop-blur rounded-xl px-5 py-3 mb-5">
      <span class="text-purple-100 font-bold">分數：<span id="score" class="text-amber-300 text-xl">0</span></span> <span class="text-purple-100 text-sm">配對：<span id="pairs">0</span>/5</span>
     </div>
     <div id="board" class="grid grid-cols-2 gap-3 mb-5"></div>
     <div id="result" class="hidden bg-white/10 backdrop-blur rounded-2xl p-6 mb-4 fade-in">
      <p class="text-2xl font-bold text-white mb-2">🎉 配對完成！</p>
      <p class="text-amber-300 text-3xl font-black mb-4">得分：<span id="final-score"></span> 分</p><button id="submit-btn" onclick="submitScore()" class="w-full bg-green-500 hover:bg-green-400 text-white font-bold px-6 py-3 rounded-xl transition-colors text-lg mb-3 shadow-lg">送出成績</button>
     </div><button id="restart-btn" onclick="resetGame()" class="bg-amber-400 hover:bg-amber-300 text-indigo-900 font-bold px-6 py-3 rounded-xl transition-colors text-lg shadow-lg"> <span id="restart-text">開始遊戲</span> </button>
    </div>
   </div>
  </div>
  <script>
// 康軒版國中英文第二冊第三章詞彙庫
const vocabPool = [
  { en: "convenient", zh: "方便的" },
  { en: "foreign", zh: "外國的" },
  { en: "culture", zh: "文化" },
  { en: "popular", zh: "受歡迎的" },
  { en: "traditional", zh: "傳統的" },
  { en: "delicious", zh: "美味的" },
  { en: "famous", zh: "有名的" },
  { en: "different", zh: "不同的" },
  { en: "experience", zh: "經驗；體驗" },
  { en: "special", zh: "特別的" },
  { en: "visitor", zh: "訪客" },
  { en: "market", zh: "市場" },
  { en: "temple", zh: "寺廟" },
  { en: "friendly", zh: "友善的" },
  { en: "wonderful", zh: "很棒的" }
];

let selectedCards = [];
let matchedPairs = 0;
let score = 0;
let currentVocab = [];
let locked = false;
let studentId = '';

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function enterGame() {
  const input = document.getElementById('student-id-input').value.trim();
  if (!input) {
    alert('請輸入座號');
    return;
  }
  studentId = input;
  document.getElementById('input-screen').classList.add('hidden');
  document.getElementById('game-screen').classList.remove('hidden');
  document.getElementById('display-student-id').textContent = studentId;
  startGame();
}

function startGame() {
  selectedCards = [];
  matchedPairs = 0;
  score = 0;
  locked = false;
  document.getElementById('score').textContent = '0';
  document.getElementById('pairs').textContent = '0';
  document.getElementById('result').classList.add('hidden');
  document.getElementById('restart-text').textContent = '重新開始';

  currentVocab = shuffle([...vocabPool]).slice(0, 5);

  const cards = [];
  currentVocab.forEach((item, i) => {
    cards.push({ id: `zh-${i}`, pairId: i, text: item.zh, type: 'zh' });
    cards.push({ id: `en-${i}`, pairId: i, text: item.en, type: 'en' });
  });
  shuffle(cards);

  const board = document.getElementById('board');
  board.innerHTML = '';
  cards.forEach((card, idx) => {
    const el = document.createElement('div');
    el.className = 'card rounded-xl p-4 text-center font-bold text-lg transition-all fade-in';
    el.style.animationDelay = `${idx * 50}ms`;
    el.style.opacity = '0';
    el.style.background = card.type === 'zh' ? 'rgba(249,115,22,0.2)' : 'rgba(99,102,241,0.2)';
    el.style.border = card.type === 'zh' ? '2px solid rgba(249,115,22,0.5)' : '2px solid rgba(99,102,241,0.5)';
    el.style.color = '#fff';
    el.dataset.pairId = card.pairId;
    el.dataset.cardId = card.id;
    el.textContent = card.text;
    el.addEventListener('click', () => selectCard(el, card));
    board.appendChild(el);
  });
}

function resetGame() {
  document.getElementById('input-screen').classList.remove('hidden');
  document.getElementById('game-screen').classList.add('hidden');
  document.getElementById('student-id-input').value = '';
  document.getElementById('student-id-input').focus();
  studentId = '';
  selectedCards = [];
  matchedPairs = 0;
  score = 0;
  currentVocab = [];
}

function selectCard(el, card) {
  if (locked || el.classList.contains('matched') || el.classList.contains('selected')) return;
  if (selectedCards.length === 1 && selectedCards[0].card.type === card.type) return;

  el.classList.add('selected');
  selectedCards.push({ el, card });

  if (selectedCards.length === 2) {
    locked = true;
    const [a, b] = selectedCards;
    if (a.card.pairId === b.card.pairId) {
      score += 20;
      matchedPairs++;
      document.getElementById('score').textContent = score;
      document.getElementById('pairs').textContent = matchedPairs;
      a.el.classList.add('matched', 'correct');
      b.el.classList.add('matched', 'correct');
      a.el.classList.remove('selected');
      b.el.classList.remove('selected');
      selectedCards = [];
      locked = false;
      if (matchedPairs === 5) endGame();
    } else {
      a.el.classList.add('wrong');
      b.el.classList.add('wrong');
      setTimeout(() => {
        a.el.classList.remove('selected', 'wrong');
        b.el.classList.remove('selected', 'wrong');
        selectedCards = [];
        locked = false;
      }, 600);
    }
  }
}

function endGame() {
  document.getElementById('final-score').textContent = score;
  document.getElementById('result').classList.remove('hidden');
}

async function submitScore() {
  const submitBtn = document.getElementById('submit-btn');
  submitBtn.disabled = true;
  submitBtn.textContent = '上傳中...';

  const result = await window.dataSdk.create({
    student_id: studentId,
    score: score,
    timestamp: new Date().toISOString()
  });

  if (result.isOk) {
    submitBtn.textContent = '成績已送出！';
    setTimeout(() => {
      resetGame();
    }, 1500);
  } else {
    submitBtn.disabled = false;
    submitBtn.textContent = '送出成績';
    alert('上傳失敗，請重試');
  }
}

// Data SDK initialization
const dataHandler = {
  onDataChanged(data) {
    // Write-only mode, no need to display data
  }
};

// Initialize Data SDK
(async () => {
  const result = await window.dataSdk.init(dataHandler);
  if (!result.isOk) {
    console.error('Data SDK initialization failed');
  }
})();

// Element SDK
const defaultConfig = {
  game_title: '英語記憶配對遊戲',
  background_color: '#312e81',
  surface_color: '#ffffff1a',
  text_color: '#ffffff',
  primary_action_color: '#fbbf24',
  secondary_action_color: '#a78bfa'
};

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    document.getElementById('title').textContent = config.game_title || defaultConfig.game_title;
    document.getElementById('app').style.background = `linear-gradient(135deg, ${config.background_color || defaultConfig.background_color}, #1e1b4b)`;
    document.querySelectorAll('#title').forEach(el => {
      el.style.color = config.text_color || defaultConfig.text_color;
    });
    const btn = document.getElementById('restart-btn');
    btn.style.backgroundColor = config.primary_action_color || defaultConfig.primary_action_color;
  },
  mapToCapabilities: (config) => ({
    recolorables: [
      { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
      { get: () => config.surface_color || defaultConfig.surface_color, set: (v) => { config.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } }
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || 'Fredoka',
      set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: undefined
  }),
  mapToEditPanelValues: (config) => new Map([
    ["game_title", config.game_title || defaultConfig.game_title]
  ])
});

lucide.createIcons();
</script>
